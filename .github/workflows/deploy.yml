name: Deployment Workflow

on:
  push:
    branches:
      - main
    paths:
      - app.py
      - config.py
      - templates/**
      - static/**
      - Dockerfile
      - requirements.txt
      - docker-compose.yml

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: sakila-app

jobs:

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show environment variables
        run: |
          echo "Deploying to STAGING"
          echo "IMAGE_NAME=${{ env.IMAGE_NAME }}"
          echo "BRANCH=${{ github.ref_name }}"
          echo "COMMIT=${{ github.sha }}"

      - name: Simulate Docker staging deployment
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:staging .
          docker images

      - name: Create Job Summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: staging" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ env.IMAGE_NAME }}:staging" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: SUCCESS" >> $GITHUB_STEP_SUMMARY

      - name: Notification
        run: |
          echo "Slack notification: Deployment to staging successful"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate Production Deployment
        run: |
          echo "Deploying to PRODUCTION environment"
          echo "Production deployment successful"

      - name: Create Version Tag
        id: version
        run: |
          echo "TAG_NAME=v$(date +'%Y.%m.%d')" >> $GITHUB_ENV
          echo "tag=v$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            Automated production deployment release.
            Deployment completed successfully.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notification
        run: |
          echo "Slack notification: Deployment to production successful"