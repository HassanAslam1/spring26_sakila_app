name: Deploy Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches: [main]

  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'

# 🔴 REQUIRED for release creation (fixes your 403 error)
permissions:
  contents: write

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Build staging image
        run: docker build -t $IMAGE_NAME:staging .
        run: |
          docker build -t $IMAGE_NAME:staging .

      - name: Run staging container
        run: |
          docker run -d -p 5000:5000 --name staging-app $IMAGE_NAME:staging
          sleep 5
          echo "Staging container started successfully"

      - name: Print environment variables
        run: |
          echo "STAGING DEPLOYMENT"
          echo "IMAGE: $IMAGE_NAME:staging"
          echo "STATUS: SUCCESS"

      - name: Write Job Summary
        run: |
          echo "## 🚀 Staging Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Image: $IMAGE_NAME:staging" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Success" >> $GITHUB_STEP_SUMMARY
      - name: Staging Job Summary
        run: |
          echo "## 🚀 Staging Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Image: $IMAGE_NAME:staging" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Success" >> $GITHUB_STEP_SUMMARY

      - name: Staging Notification
        run: |
          echo "Slack notification: Deployment to staging successful"

  deploy-production:
    runs-on: ubuntu-latest
    environment: production   # 👈 triggers manual approval if set in GitHub UI
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t $IMAGE_NAME:latest .
        run: |
          docker build -t $IMAGE_NAME:latest .

      - name: Production deployment
        run: |
          echo "Deploying to PRODUCTION..."
          echo "IMAGE: $IMAGE_NAME:latest"
          echo "SUCCESS"

      # ✅ FIXED RELEASE STEP (NO gh CLI needed → avoids permission + missing setup issues)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: "Automated production deployment"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          echo "PRODUCTION DEPLOYMENT SUCCESSFUL"

      # ✅ FIXED RELEASE STEP (NO gh CLI needed → avoids permission + missing setup issues)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Production Job Summary
        run: |
          TAG_NAME="v$(date +'%Y.%m.%d')"
          gh release create $TAG_NAME --title "Release $TAG_NAME" --notes "Automated production deployment"