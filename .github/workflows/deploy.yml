name: Deploy Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'

# REQUIRED for release creation (fixes your 403 error)
permissions:
  contents: write

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Print Environment Variables
        run: env
        
      - name: Build and Run Docker Image (Staging)
        run: |
          docker build -t sakila-app:staging .
          docker run -d --name staging-container -p 5000:5000 sakila-app:staging
          
      - name: Simulated Notification
        run: echo "Slack notification: Deployment to staging successful"
        
      - name: Output Job Summary
        run: echo "### Staging Deployment Completed :rocket:" >> $GITHUB_STEP_SUMMARY

  deploy-production:
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Simulated Production Deployment
        run: echo "Initiating deployment to production servers... Success!"
        
      - name: Simulated Notification
        run: echo "Slack notification: Deployment to production successful"
        
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v$(date +'%Y.%m.%d-%H%M%S')"
          gh release create $TAG_NAME --title "Release $TAG_NAME" --notes "Automated production deployment"