name: Deployment Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
  push:
    branches: [main]
    paths:
      - "app.py"
      - "config.py"
      - "templates/**"
      - "static/**"
      - "Dockerfile"
      - "requirements.txt"
      - "docker-compose.yml"

env:
  IMAGE_NAME: sakila-app

jobs:
  deploy-staging:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build staging image
        run: |
          docker build -t $IMAGE_NAME:staging .

      - name: Run staging container
        run: |
          docker run -d -p 5000:5000 --name staging-app $IMAGE_NAME:staging
          sleep 5
          echo "Staging container started successfully"

      - name: Print environment variables
        run: |
          echo "STAGING DEPLOYMENT"
          echo "IMAGE: $IMAGE_NAME:staging"
          echo "STATUS: SUCCESS"

      - name: Staging Job Summary
        run: |
          echo "## 🚀 Staging Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Image: $IMAGE_NAME:staging" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Running" >> $GITHUB_STEP_SUMMARY

      - name: Staging Notification
        run: |
          echo "Slack notification: Deployment to staging successful"

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: |
          docker build -t $IMAGE_NAME:latest .

      - name: Production deployment
        run: |
          echo "Deploying to PRODUCTION..."
          echo "IMAGE: $IMAGE_NAME:latest"
          echo "PRODUCTION DEPLOYMENT SUCCESSFUL"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +'%Y.%m.%d')
          TAG="v$DATE"
          echo "Creating release $TAG"
          gh release create "$TAG" --title "Release $TAG" --notes "Automated production deployment"

      - name: Production Job Summary
        run: |
          echo "## 🚀 Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Image: $IMAGE_NAME:latest" >> $GITHUB_STEP_SUMMARY
          echo "- Release created" >> $GITHUB_STEP_SUMMARY

      - name: Production Notification
        run: |
          echo "Slack notification: Deployment to production successful"