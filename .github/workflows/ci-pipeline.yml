name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: 3.9
  IMAGE_NAME: sakila-app

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install flake8
      - run: flake8 . --max-line-length=120 --ignore=E501,W503

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt pytest pymysql
      - run: |
          wget https://downloads.mysql.com/docs/sakila-db.tar.gz
          tar -xvf sakila-db.tar.gz
          mysql -h 127.0.0.1 -uroot -padmin < sakila-db/sakila-schema.sql
          mysql -h 127.0.0.1 -uroot -padmin < sakila-db/sakila-data.sql
      - run: pytest tests/ -v
        env:
          MYSQL_HOST: 127.0.0.1

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - run: docker images
      - run: |
          docker run -d -p 5000:5000 --name app ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 5
          curl -f http://localhost:5000 || exit 1

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          output: 'trivy-report.txt'
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.txt